<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--txt);background:#fff;line-height:1.9}

.hero{background:#1e1e4a;color:#fff;padding:44px 24px 36px;text-align:center}

.hero h1{font-family:var(--serif);font-size:24px;margin-bottom:10px;line-height:1.35}
.hero h1 span{color:#ffd166}

.hero-stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.stat-n{font-family:var(--mono);font-size:20px;font-weight:600;color:#ffd166}
.stat-l{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}

.sbar{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid var(--bdr);

.sbar-lbl{font-size:12px;color:var(--mut)}
.sbar-num{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--pri)}
.prog-wrap{flex:1;max-width:160px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--pri);border-radius:3px;transition:width .4s}
.rbtn{margin-left:auto;padding:5px 12px;border:1px solid var(--bdr);border-radius:6px;
  font-size:12px;color:var(--mut);cursor:pointer;font-family:var(--sans);background:#fff;transition:all .15s}
.rbtn:hover{border-color:var(--pri);color:var(--pri)}

.wrap{max-width:740px;margin:0 auto;padding:28px 20px 60px}

.shuffle-notice{background:var(--pri-l);border:1px solid var(--bdr);border-radius:10px;

.qcard{background:#fff;border:1.5px solid var(--bdr);border-radius:12px;padding:18px 20px;
  margin-bottom:12px;transition:border-color .2s}
.qcard.ok{border-color:#6dbf9a}
.qcard.ng{border-color:#e8a090}

.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qnum{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--gray);
  padding:2px 8px;border-radius:4px}
.qsec{font-size:10px;color:var(--mut);background:var(--gray);padding:2px 8px;border-radius:4px}

.sent{font-family:var(--mono);font-size:14px;line-height:1.7;padding:10px 14px;
  background:var(--gray);border-radius:8px;margin-bottom:12px;word-break:break-word}

.btn-row{display:flex;gap:8px}
.obtn,.xbtn{flex:1;padding:9px 0;border:1.5px solid var(--bdr);border-radius:8px;

.obtn:hover{background:#eaf6f0;border-color:#6dbf9a}
.xbtn:hover{background:#fdf0ed;border-color:#e8a090}
.obtn.correct{background:#1a6e42;border-color:#1a6e42;color:#fff}
.xbtn.correct{background:#c0392b;border-color:#c0392b;color:#fff}
.obtn.wrong,.xbtn.wrong{background:#e8a090;border-color:#e0a090;color:#fff}

.exp{display:none;margin-top:12px;padding:12px 14px;border-radius:8px;
  font-size:13px;line-height:1.8;border-left:3px solid}
.exp.show{display:block}

.exp.wrong{background:var(--red-bg);border-color:var(--acc);color:#7a2010}

.result-total{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px}
.result-msg{font-size:16px;margin-top:16px;font-family:var(--serif)}
.result-bar{margin:20px auto;max-width:300px;height:8px;background:rgba(255,255,255,.15);

.restart-btn:hover{background:rgba(255,255,255,.1)}

.nav-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;

  padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;

.jump-btn:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.jump-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* ── 팝업 오버레이 ── */
.pop-overlay{position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s}
.pop-overlay.show{opacity:1;pointer-events:all}
.pop-box{background:#fff;border-radius:20px;padding:32px 40px;text-align:center;

  transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.pop-overlay.show .pop-box{transform:scale(1)}
.pop-icon{font-size:52px;line-height:1;margin-bottom:10px}
.pop-label{font-size:13px;font-family:var(--mono);color:var(--mut);

.pop-sub{font-size:13px;color:var(--mut)}
.pop-box.correct-pop{border-top:5px solid #1a6e42}
.pop-box.wrong-pop{border-top:5px solid #c0392b}

</style>

<script>
/* ── Web Audio 효과음 ── */
let _AC = null;
function getAC() {
  if (!_AC) _AC = new (window.AudioContext || window.webkitAudioContext)();
  return _AC;
}

function beep(type) {
  try {
    const ac = getAC();
    const resume = ac.state === 'suspended' ? ac.resume() : Promise.resolve();
    resume.then(() => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      if (type === 'correct') {
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + .12);
        osc.frequency.setValueAtTime(784, ac.currentTime + .24);
        gain.gain.setValueAtTime(.25, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .55);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + .55);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, ac.currentTime);
        gain.gain.setValueAtTime(.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001, ac.currentTime + .3);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + .3);
      }
    });
  } catch(e) { console.warn('beep error:', e); }
} else {
    osc.frequency.setValueAtTime(200, AC.currentTime);
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(.18, AC.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, AC.currentTime + .35);
    osc.start(); osc.stop(AC.currentTime + .35);
  }
}

/* ── 팝업 ── */
let popTimer = null;
function showPop(correct, sentText) {
  const _play = () => beep(correct ? 'correct' : 'wrong');
  _play();
  const overlay = document.getElementById('pop-overlay');
  const box     = document.getElementById('pop-box');
  document.getElementById('pop-icon').textContent  = correct ? '🎉' : '❌';
  document.getElementById('pop-label').textContent = correct ? 'CORRECT' : 'WRONG';
  document.getElementById('pop-msg').textContent   = correct ? '정답!' : '오답';
  document.getElementById('pop-sub').textContent   = sentText ? sentText.replace(/^\*/,'') : '';
  box.className = 'pop-box ' + (correct ? 'correct-pop' : 'wrong-pop');
  overlay.classList.add('show');
  if (popTimer) clearTimeout(popTimer);
  popTimer = setTimeout(closePop, 1400);
}
function closePop() {
  document.getElementById('pop-overlay').classList.remove('show');
}

/* ── 섹션 필터 (랜덤 퀴즈용) ── */
function filterSec(sec) {
  const cards = document.querySelectorAll('.qcard');
  cards.forEach(card => {
    const secEl = card.querySelector('.qsec');
    if (!secEl) return;
    const show = sec === 'all' || secEl.textContent.includes(sec);
    card.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.jump-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

const ALL_Q = [
  {sec:'3.3 C-command', sent:'John and Mary think everyone despises them.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>them</em>은 대명사로, [John and Mary]를 가리킬 수도 있고 문장 밖 다른 사람을 가리킬 수도 있다. 자유 지시(free reference)가 가능하므로 정문.'},
  {sec:'3.3 C-command', sent:'John and Mary despise themselves.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>themselves</em>는 anaphor(재귀사). [John and Mary]가 c-commanding antecedent로 기능하며 복수 선행사이므로 appropriateness 조건도 충족.'},
  {sec:'3.3 C-command', sent:'John and Mary despise each other.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>each other</em>는 anaphor(상호사). [John and Mary]는 두 개체를 지시하므로 appropriateness 조건 충족, c-command도 만족.'},
  {sec:'3.3 C-command', sent:'*John despises each other.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>each other</em>는 두 개체 이상을 지시하는 선행사가 필요한데, <em>John</em>은 단수. 적절한 antecedent가 없으므로 anaphor 해석 불가.'},
  {sec:'3.3 C-command', sent:'*I despise himself.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>himself</em>는 3인칭 단수 anaphor이고, <em>I</em>는 1인칭. Person 불일치로 appropriateness 조건 위반.'},
  {sec:'3.3 C-command', sent:'*Each other are always arguing.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>each other</em>는 anaphor이지만 문장 내에 어떤 potential antecedent도 존재하지 않아 해석 불가.'},
  {sec:'3.3 C-command', sent:'The soldiers might disgrace themselves.', ans:'O',
   exp:'<strong>✓ 정문.</strong> NP [the soldiers]가 <em>themselves</em>를 c-command한다. 복수 선행사이므로 appropriateness 조건도 만족.'},
  {sec:'3.3 C-command', sent:'*The soldiers\' behaviour might disgrace themselves.', ans:'X',
   exp:'<strong>✗ 비문.</strong> [the soldiers\']는 NP [the soldiers\' behaviour] 내부에 포함되어 있어 <em>themselves</em>를 c-command하지 못한다. C-command 조건 위반.'},
  {sec:'3.3 C-command', sent:'The men will shoot the arrows at each other.', ans:'O',
   exp:'<strong>✓ 정문 (구조적 중의성).</strong> <em>each other</em>의 선행사로 [the men]도 가능하고 [the arrows]도 가능하다 — 두 가지 해석 모두 성립.'},
  {sec:'3.3 C-command', sent:'Tom will buy himself another bike.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>himself</em>는 anaphor. <em>Tom</em>이 c-commanding antecedent로 기능한다. [원문 변형: John→Tom, car→bike]'},
  {sec:'3.4 No Crossing', sent:'*Drunks would put completely off the customers.', ans:'X',
   exp:'<strong>✗ 비문.</strong> VP-adverb <em>completely</em>는 VP의 immediate constituent여야 한다. 이 구조에서는 No Crossing Branches Constraint 위반이 불가피.'},
  {sec:'3.4 No Crossing', sent:'Drunks would put the customers off completely.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>completely</em>가 VP 전체의 right-adjunct로 붙어 No Crossing Branches를 위반하지 않는다.'},
  {sec:'NPI ever', sent:'*I will ever forgive you for that.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>ever</em>는 NPI로, 부정 표현이 선행하며 c-command해야 한다. 긍정문에는 사용 불가.'},
  {sec:'NPI ever', sent:'Nobody will ever forgive you for that.', ans:'O',
   exp:'<strong>✓ 정문.</strong> 부정 NP <em>Nobody</em>가 <em>ever</em>를 선행하고 c-command한다. NPI 조건 충족.'},
  {sec:'NPI ever', sent:'I won\'t ever forgive you for that.', ans:'O',
   exp:'<strong>✓ 정문.</strong> 부정 Modal <em>won\'t</em>이 <em>ever</em>를 선행하고 c-command한다. NPI 조건 충족.'},
  {sec:'NPI ever', sent:'*I will ever forgive nobody for that.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>nobody</em>는 <em>ever</em>를 선행하지 않는다(precede ✗). NPI는 부정 표현이 선행 AND c-command 두 조건 모두 필요.'},
  {sec:'NPI ever', sent:'*Someone who didn\'t like you would ever forgive you for that.', ans:'X',
   exp:'<strong>✗ 비문.</strong> 부정어 <em>didn\'t</em>은 관계절 내부에 있어 주절의 <em>ever</em>를 c-command하지 못한다(precede ✓, c-command ✗).'},
  {sec:'NPI ever', sent:'No Frenchman ever would help an Englishman.', ans:'O',
   exp:'<strong>✓ 정문.</strong> 부정 Det <em>No</em>를 포함한 NP [No Frenchman]이 <em>ever</em>를 선행하고 c-command한다.'},
  {sec:'NPI ever', sent:'No Frenchman would ever help an Englishman.', ans:'O',
   exp:'<strong>✓ 정문.</strong> NP [No Frenchman]이 <em>ever</em>를 선행하고 c-command. 위치가 달라져도 두 조건 모두 충족.'},
  {sec:'NPI ever', sent:'No Frenchman would help an Englishman ever.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>ever</em>가 문장 끝에 위치해도 NP [No Frenchman]이 선행 + c-command 조건을 충족한다.'},
  {sec:'NPI ever', sent:'*Some Frenchmen ever wouldn\'t help an Englishman.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>ever</em>가 부정어 <em>wouldn\'t</em>보다 앞에 위치. 부정 표현이 NPI를 선행해야 하므로 precede 조건 위반.'},
  {sec:'NPI ever', sent:'Some Frenchmen wouldn\'t ever help an Englishman.', ans:'O',
   exp:'<strong>✓ 정문.</strong> 부정 Modal <em>wouldn\'t</em>가 <em>ever</em>를 선행하고 c-command. 두 조건 모두 충족.'},
  {sec:'NPI ever', sent:'*Some Frenchmen ever would help no Englishman.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>no Englishman</em>은 <em>ever</em>를 선행하지 않는다(precede ✗). NPI 조건 위반.'},
  {sec:'NPI ever', sent:'*Some Frenchmen would ever help no Englishman.', ans:'X',
   exp:'<strong>✗ 비문.</strong> <em>no Englishman</em>이 VP 내에서 <em>ever</em>보다 뒤에 위치 — precede 조건 위반.'},
  {sec:'3.6–3.8 Categories', sent:'John rang up his mother.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>up</em>은 Particle(전치사의 일종)로서 Phrasal Verb [rang up]을 형성한다.'},
  {sec:'3.6–3.8 Categories', sent:'It was a car that she bought.', ans:'O',
   exp:'<strong>✓ 정문.</strong> cleft sentence의 focus 자리에는 NP 또는 PP만 올 수 있다. NP [a car]는 적합한 범주.'},
  {sec:'3.6–3.8 Categories', sent:'*It is very pretty that she is.', ans:'X',
   exp:'<strong>✗ 비문.</strong> cleft sentence의 focus 자리에 AP [very pretty]는 올 수 없다. NP·PP만 허용되는 범주 제약 위반.'},
  {sec:'3.6–3.8 Categories', sent:'John is a banker and extremely rich.', ans:'O',
   exp:'<strong>✓ 정문.</strong> be 동사의 보어 위치에서 NP [a banker]와 AP [extremely rich]가 등위 접속 가능. Predicative 위치에서는 다양한 범주 허용.'},
  {sec:'3.6–3.8 Categories', sent:'She works very carefully.', ans:'O',
   exp:'<strong>✓ 정문.</strong> <em>carefully</em>는 Adverb(ADV). TG에서 Adjective와 Adverb는 동일 범주[+N,+V]의 위치적 변이형으로 분석된다.'},
  {sec:'3.6–3.8 Categories', sent:'*It is go home that I will.', ans:'X',
   exp:'<strong>✗ 비문.</strong> cleft sentence의 focus 자리에 VP [go home]은 올 수 없다. NP·PP만 허용(VP는 pseudo-cleft에서만 가능).'},
];

const TOTAL = ALL_Q.length;
let order = [];
let state = {};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildQuiz() {
  order = shuffle([...Array(TOTAL).keys()]);
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  order.forEach((qi, pos) => {
    const q = ALL_Q[qi];
    const div = document.createElement('div');
    div.className = 'qcard';
    div.id = 'qc' + pos;
    div.innerHTML = `
      <div class="qmeta">
        <span class="qnum">${String(pos+1).padStart(2,'0')}</span>
        <span class="qsec">${q.sec}</span>
      </div>
      <div class="sent">${q.sent.replace(/\*(.*)/,'<span style="color:#c0392b">*</span>$1').replace(/\*(.*)/,'$1')}</div>
      <div class="btn-row">
        <button class="obtn" onclick="check(${pos},${qi},'O')">⭕ 정문</button>
        <button class="xbtn" onclick="check(${pos},${qi},'X')">❌ 비문</button>
      </div>
      <div class="exp" id="exp${pos}">${q.exp}</div>
    `;
    container.appendChild(div);
  });
}

function check(pos, qi, chosen) {
  if (state[pos]) return;
  const answer = ALL_Q[qi].ans;
  const correct = chosen === answer;
  state[pos] = { correct };
  const sentText = ALL_Q[qi].sent || '';
  showPop(correct, sentText);

  const card = document.getElementById('qc' + pos);
  const exp  = document.getElementById('exp' + pos);
  const oBtn = card.querySelector('.obtn');
  const xBtn = card.querySelector('.xbtn');

  if (chosen === 'O') oBtn.classList.add(correct ? 'correct' : 'wrong');
  else xBtn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    if (answer === 'O') oBtn.classList.add('correct');
    else xBtn.classList.add('correct');
  }

  exp.classList.add('show', correct ? 'correct' : 'wrong');
  card.classList.add(correct ? 'ok' : 'ng');
  oBtn.disabled = true;
  xBtn.disabled = true;

  updateStats();
}

function updateStats() {
  const answered = Object.keys(state).length;
  const correct  = Object.values(state).filter(s => s.correct).length;
  document.getElementById('answered-n').textContent = answered;
  document.getElementById('correct-n').textContent  = correct;
  document.getElementById('sb-ans').textContent     = answered;
  document.getElementById('prog').style.width       = (answered / TOTAL * 100) + '%';
  if (answered === TOTAL) showResult(correct);
}

function showResult(score) {
  const box = document.getElementById('result-box');
  box.classList.add('show');
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-fill').style.width  = (score / TOTAL * 100) + '%';
  const pct = score / TOTAL;
  const msgs = [
    [1.00,'🏆 완벽! C-command & NPI 완전 정복!'],
    [0.90,'🌟 훌륭해요! 거의 다 맞혔어요.'],
    [0.70,'👍 잘 하고 있어요! 조금 더 다듬어봐요.'],
    [0.50,'📖 반복 학습으로 개념을 굳혀봐요.'],
    [0,   '💪 다시 한번! C-command 조건을 집중 복습해요.']
  ];
  document.getElementById('r-msg').textContent = msgs.find(([t])=>pct>=t)[1];
}

function resetAll() {
  state = {};
  document.getElementById('answered-n').textContent = '0';
  document.getElementById('correct-n').textContent  = '0';
  document.getElementById('sb-ans').textContent     = '0';
  document.getElementById('prog').style.width       = '0%';
  document.getElementById('result-box').classList.remove('show');
  buildQuiz();
}

buildQuiz();
</script>
</body>
</html>
