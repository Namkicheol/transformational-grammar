<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch.2 Structure — 예문 O/X 퀴즈 | TG Study</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#2d2d6b;--pri-l:#f0f0fa;--acc:#e8533a;
  --grn:#1a6e42;--grn-bg:#eaf6f0;--grn-bd:#90d0b0;
  --red-bg:#fdf0ed;--red-bd:#e0a090;
  --bdr:#e4e4f0;--gray:#f7f7f9;
  --txt:#1a1a2e;--mut:#777;
  --serif:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--txt);background:#fff;line-height:1.9}

/* hero */
.hero{background:#1e1e4a;color:#fff;padding:44px 24px 36px;text-align:center}
.hero-tag{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.45);margin-bottom:12px;font-family:var(--mono);text-transform:uppercase}
.hero h1{font-family:var(--serif);font-size:24px;margin-bottom:10px;line-height:1.35}
.hero h1 span{color:#ffd166}
.hero p{font-size:13px;color:rgba(255,255,255,.55);max-width:460px;margin:0 auto 18px}
.hero-stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
.stat-n{font-family:var(--mono);font-size:20px;font-weight:600;color:#ffd166}
.stat-l{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}

/* score bar */
.sbar{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid var(--bdr);
  padding:9px 20px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sbar-lbl{font-size:12px;color:var(--mut)}
.sbar-num{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--pri)}
.prog-wrap{flex:1;max-width:160px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--pri);border-radius:3px;transition:width .4s}
.rbtn{margin-left:auto;padding:5px 12px;border:1px solid var(--bdr);border-radius:6px;
  font-size:12px;color:var(--mut);cursor:pointer;font-family:var(--sans);background:#fff;transition:all .15s}
.rbtn:hover{border-color:var(--pri);color:var(--pri)}

/* wrap */
.wrap{max-width:740px;margin:0 auto;padding:28px 20px 60px}

/* section header */
.sec-hd{margin:40px 0 14px;padding-bottom:10px;border-bottom:2px solid var(--pri)}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.sec-title{font-family:var(--serif);font-size:18px;color:var(--pri)}
.sec-ref{font-size:12px;color:var(--mut);margin-top:3px}

/* question card */
.qcard{background:#fff;border:1.5px solid var(--bdr);border-radius:12px;padding:18px 20px;
  margin-bottom:12px;transition:border-color .2s}
.qcard.ok{border-color:#6dbf9a}
.qcard.ng{border-color:#e8a090}

.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qnum{font-family:var(--mono);font-size:11px;color:var(--mut)}
.qsec-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--pri-l);color:var(--pri);font-family:var(--mono)}

/* 예문 */
.qeng{font-family:var(--mono);font-size:14px;color:#1a1a2e;background:var(--gray);
  border-left:3px solid var(--pri);padding:10px 14px;border-radius:0 8px 8px 0;
  display:block;margin-bottom:10px;line-height:1.7;white-space:pre-line}
.qask{font-size:13.5px;color:var(--mut);margin-bottom:12px}

/* OX 버튼 */
.ox-row{display:flex;gap:12px}
.ox-btn{flex:1;padding:13px;font-size:22px;border:1.5px solid var(--bdr);border-radius:10px;
  background:#fff;cursor:pointer;transition:all .18s;font-family:var(--sans);
  display:flex;align-items:center;justify-content:center;gap:8px}
.ox-btn:hover:not([disabled]){border-color:var(--pri);background:var(--pri-l)}
.ox-btn .ox-text{font-size:13px;font-family:var(--sans);color:var(--mut)}
.ox-btn.ok2{border-color:var(--grn)!important;background:var(--grn-bg)!important}
.ox-btn.ng2{border-color:var(--acc)!important;background:var(--red-bg)!important}

/* feedback */
.fb{display:none;margin-top:12px;padding:12px 16px;border-radius:9px;
  font-size:13.5px;line-height:1.8}
.fb.ok{background:var(--grn-bg);border:1px solid var(--grn-bd);color:#145535}
.fb.ng{background:var(--red-bg);border:1px solid var(--red-bd);color:#8a2010}
.fb-head{font-weight:700;font-size:14px;margin-bottom:4px}
.fb-reason{font-size:13px;line-height:1.75}
.fb-key{display:inline-block;margin-top:6px;font-family:var(--mono);font-size:11px;
  padding:2px 8px;border-radius:6px;background:rgba(0,0,0,.07)}

/* result */
.rbox{display:none;margin-top:36px;padding:28px 24px;background:var(--pri-l);
  border:1.5px solid #c0c0e8;border-radius:16px;text-align:center}
.r-icon{font-size:36px;margin-bottom:10px}
.r-score{font-family:var(--serif);font-size:24px;color:var(--pri);font-weight:700;margin-bottom:6px}
.r-msg{font-size:13px;color:var(--mut);margin-bottom:16px}
.r-btn{padding:9px 24px;background:var(--pri);color:#fff;border:none;border-radius:8px;
  font-size:13px;cursor:pointer;font-family:var(--sans)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Transformational Grammar · Andrew Radford · Ch.2</div>
  <h1>Structure<br><span>예문 O/X 퀴즈</span> — 순서대로</h1>
  <p>교재 원문 예문 기반 · 문법적이면 O, 비문이면 X</p>
  <div class="hero-stats">
    <div><div class="stat-n">9</div><div class="stat-l">섹션</div></div>
    <div><div class="stat-n">43</div><div class="stat-l">문제</div></div>
    <div><div class="stat-n">O / X</div><div class="stat-l">유형</div></div>
  </div>
</div>

<div class="sbar">
  <span class="sbar-lbl">맞은 문제</span>
  <span class="sbar-num"><span id="sc">0</span>&thinsp;/&thinsp;<span id="st">43</span></span>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <button class="rbtn" onclick="reset()">↺ 다시 풀기</button>
</div>

<div class="wrap">
  <div id="qw"></div>
  <div class="rbox" id="rb">
    <div class="r-icon" id="ri"></div>
    <div class="r-score" id="rs"></div>
    <div class="r-msg" id="rm"></div>
    <button class="r-btn" onclick="reset()">↺ 다시 풀기</button>
  </div>
</div>

   why:'completely(VP-adverb)가 VP 앞에 위치했습니다. V와 NP 사이에 끼어들지 않아 문법적입니다.',
   key:'VP-adverb → VP 앞 ✓'},

  {sec:'§2.8 Strict Adjacency Principle',
   eng:'She will review thoroughly the document.',
   ask:'이 문장은 문법적이다.',
   ans:false,
   why:'completely가 V(finish)와 NP(the assignment) 사이에 끼어들었습니다. Strict Adjacency Principle 위반입니다.',
   key:'V와 NP 사이 부사 삽입 → 비문'},

  {sec:'§2.8 Strict Adjacency Principle',
   eng:'He discussed every detail with the supervisor.',
   ask:'이 문장은 문법적이다.',
   ans:true,
   why:'PP complement(about every point)가 동사 뒤에, 또 다른 PP(with the tax-man)가 그 뒤에 위치했습니다. PP는 순서를 바꿔도 됩니다.',
   key:'PP complement → 위치 유연 ✓'},

  {sec:'§2.8 Strict Adjacency Principle',
   eng:'He discussed with the supervisor every detail.',
   ask:'이 문장은 문법적이다.',
   ans:false,
   why:'NP complement(every point)가 다른 PP(with the tax-man) 뒤에 위치했습니다. NP complement는 반드시 V 바로 뒤에 와야 합니다.',
   key:'NP complement는 V 바로 뒤 → Strict Adjacency Principle'}
];

let ANS, COR, SHUFFLED;

function getOrder(shuffle) {
  const idx = DATA.map((_,i) => i);
  if (shuffle) {
    for (let i = idx.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
  }
  return idx;
}

function build(shuffle) {
  SHUFFLED = getOrder(shuffle);
  ANS = new Array(DATA.length).fill(false);
  COR = 0;
  document.getElementById('sc').textContent = 0;
  document.getElementById('st').textContent = DATA.length;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('rb').style.display = 'none';

  const wrap = document.getElementById('qw');
  wrap.innerHTML = '';
  let lastSec = '';

  SHUFFLED.forEach((di, qi) => {
    const q = DATA[di];
    if (!shuffle && q.sec !== lastSec) {
      lastSec = q.sec;
      const sh = document.createElement('div');
      sh.className = 'sec-hd';
      sh.innerHTML = `<div class="sec-tag">섹션</div>
        <div class="sec-title">${q.sec}</div>`;
      wrap.appendChild(sh);
    }

    const card = document.createElement('div');
    card.className = 'qcard'; card.id = 'qc' + qi;

    card.innerHTML = `
      <div class="qmeta">
        <span class="qnum">Q${qi + 1}</span>
        <span class="qsec-tag">${q.sec}</span>
      </div>
      <span class="qeng">${q.eng}</span>
      <div class="qask">${q.ask}</div>
      <div class="ox-row">
        <button class="ox-btn" id="bo${qi}" onclick="doOX(${qi},${di},true)">
          O <span class="ox-text">문법적이다</span>
        </button>
        <button class="ox-btn" id="bx${qi}" onclick="doOX(${qi},${di},false)">
          X <span class="ox-text">비문이다</span>
        </button>
      </div>
      <div class="fb" id="fb${qi}"></div>`;
    wrap.appendChild(card);
  });
}

function doOX(qi, di, v) {
  if (ANS[qi]) return;
  ANS[qi] = true;
  const q = DATA[di];
  const ok = v === q.ans;
  if (ok) COR++;

  const done = ANS.filter(Boolean).length;
  document.getElementById('sc').textContent = COR;
  document.getElementById('prog').style.width = (done / DATA.length * 100) + '%';

  const ob = document.getElementById('bo' + qi);
  const xb = document.getElementById('bx' + qi);
  ob.disabled = xb.disabled = true;

  if (v)  { ob.classList.add(ok ? 'ok2' : 'ng2'); if (!ok) xb.classList.add('ok2'); }
  else    { xb.classList.add(ok ? 'ok2' : 'ng2'); if (!ok) ob.classList.add('ok2'); }

  const fb = document.getElementById('fb' + qi);
  fb.style.display = 'block';
  fb.className = 'fb ' + (ok ? 'ok' : 'ng');
  fb.innerHTML = `<div class="fb-head">${ok ? '✓ 정답' : '✗ 오답'} — 정답: ${q.ans ? 'O (문법적)' : 'X (비문)'}</div>
    <div class="fb-reason">${q.why}</div>
    <span class="fb-key">${q.key}</span>`;

  document.getElementById('qc' + qi).classList.add(ok ? 'ok' : 'ng');

  if (ANS.every(a => a)) showResult();
}

function showResult() {
  const pct = Math.round(COR / DATA.length * 100);
  const tiers = [
    {min:90, icon:'🎯', msg:'완벽합니다! Ch.2 예문 마스터!'},
    {min:70, icon:'👏', msg:'잘 했어요! 틀린 문제 해설을 다시 확인해보세요.'},
    {min:50, icon:'📚', msg:'조금 더! Phrasal V / S-adverb 위주로 복습하세요.'},
    {min:0,  icon:'💪', msg:'개념 정리부터 다시 읽어보세요.'}
  ];
  const t = tiers.find(x => pct >= x.min);
  const rb = document.getElementById('rb');
  rb.style.display = 'block';
  document.getElementById('ri').textContent = t.icon;
  document.getElementById('rs').textContent = `${COR} / ${DATA.length}점 (${pct}%)`;
  document.getElementById('rm').textContent = t.msg;
  rb.scrollIntoView({behavior:'smooth'});
}

function reset() {
  build(false);
  window.scrollTo({top:0, behavior:'smooth'});
}

build(false);
</script>
